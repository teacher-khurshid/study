<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Listening Part 1 · Practice Bank</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --teal:      #065A82;
    --teal-dark: #043F5C;
    --teal-soft: #E3EEF3;
    --teal-tint: #F0F7FA;
    --coral:     #F96167;
    --coral-soft:#FDE6E7;
    --green:     #10B981;
    --green-soft:#D1FAE5;
    --red:       #DC2626;
    --red-soft:  #FEE2E2;
    --dark:      #1F2A3D;
    --muted:     #6B7280;
    --gray-border:#E5E7EB;
    --gray-bg:   #F9FAFB;
    --white:     #FFFFFF;

    --font: 'Manrope', 'Calibri', 'Helvetica Neue', Arial, sans-serif;
    --radius: 14px;
    --radius-lg: 20px;
    --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.06);
    --shadow:    0 4px 14px rgba(15, 23, 42, 0.08);
    --shadow-lg: 0 18px 38px rgba(15, 23, 42, 0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: var(--font);
    color: var(--dark);
    background: #FAFCFD;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }

  .app { min-height: 100vh; display: flex; flex-direction: column; position: relative; }

  /* Decorative gradient blobs (landing only) */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.5;
    pointer-events: none;
    z-index: 0;
    transition: opacity 0.6s;
  }
  .blob-1 { width: 500px; height: 500px; background: var(--teal-soft); top: -150px; right: -100px; }
  .blob-2 { width: 400px; height: 400px; background: var(--coral-soft); bottom: -100px; left: -100px; opacity: 0.4; }
  body.scrolled .blob { opacity: 0.2; }

  .container { max-width: 880px; margin: 0 auto; padding: 32px 24px 64px; width: 100%; position: relative; z-index: 1; }

  /* Top bar (in-quiz) */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 24px;
    border-bottom: 1px solid var(--gray-border);
    background: var(--white);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .topbar-brand { font-weight: 700; color: var(--teal); font-size: 14px; letter-spacing: 0.04em; }
  .topbar-progress {
    flex: 1;
    margin: 0 24px;
    max-width: 420px;
  }
  .progress-track {
    height: 6px;
    background: var(--gray-border);
    border-radius: 100px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--teal), var(--coral));
    border-radius: 100px;
    transition: width 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .progress-label { display: block; font-size: 12px; color: var(--muted); margin-top: 6px; text-align: center; }
  .exit-btn {
    width: 36px; height: 36px;
    display: grid; place-items: center;
    border-radius: 50%;
    color: var(--muted);
    font-size: 18px;
    transition: background 0.15s, color 0.15s;
  }
  .exit-btn:hover { background: var(--gray-bg); color: var(--dark); }

  /* Landing */
  .hero {
    text-align: center;
    padding: 64px 0 48px;
  }
  .hero-eyebrow {
    display: inline-block;
    font-size: 13px;
    letter-spacing: 0.12em;
    font-weight: 700;
    color: var(--teal);
    background: var(--teal-soft);
    padding: 6px 14px;
    border-radius: 100px;
    margin-bottom: 24px;
  }
  .hero-title {
    font-size: clamp(40px, 6vw, 64px);
    font-weight: 800;
    color: var(--dark);
    letter-spacing: -0.02em;
    line-height: 1.05;
    margin-bottom: 14px;
  }
  .hero-title .accent { color: var(--teal); }
  .hero-sub {
    font-size: 18px;
    color: var(--muted);
    max-width: 540px;
    margin: 0 auto;
  }

  .mode-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-top: 48px;
  }
  @media (max-width: 640px) {
    .mode-grid { grid-template-columns: 1fr; }
    .hero { padding: 40px 0 24px; }
  }
  .mode-card {
    background: var(--white);
    border: 1px solid var(--gray-border);
    border-radius: var(--radius-lg);
    padding: 32px;
    text-align: left;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
    box-shadow: var(--shadow-sm);
    position: relative;
    overflow: hidden;
  }
  .mode-card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-lg);
    border-color: var(--teal);
  }
  .mode-card::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 60%, var(--teal-tint) 100%);
    opacity: 0;
    transition: opacity 0.25s;
    pointer-events: none;
  }
  .mode-card:hover::after { opacity: 1; }
  .mode-icon {
    width: 56px; height: 56px;
    border-radius: 14px;
    display: grid; place-items: center;
    font-size: 28px;
    margin-bottom: 20px;
    background: var(--teal-soft);
  }
  .mode-card.test .mode-icon { background: var(--coral-soft); }
  .mode-title { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
  .mode-desc { color: var(--muted); font-size: 15px; line-height: 1.55; }
  .mode-cta {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 20px;
    color: var(--teal);
    font-weight: 600;
    font-size: 14px;
  }
  .mode-card.test .mode-cta { color: var(--coral); }

  .signature {
    text-align: center;
    padding: 40px 0 12px;
    color: var(--muted);
    font-size: 13px;
  }
  .signature strong { color: var(--dark); font-weight: 600; }

  /* Setup screen */
  .setup {
    max-width: 640px;
    margin: 0 auto;
    padding: 48px 24px;
  }
  .setup-back {
    color: var(--muted);
    font-size: 14px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 28px;
    transition: color 0.15s;
  }
  .setup-back:hover { color: var(--teal); }
  .setup-badge {
    display: inline-block;
    font-size: 13px;
    letter-spacing: 0.12em;
    font-weight: 700;
    padding: 6px 14px;
    border-radius: 100px;
    margin-bottom: 16px;
  }
  .setup.drill .setup-badge { color: var(--teal); background: var(--teal-soft); }
  .setup.test .setup-badge { color: var(--coral); background: var(--coral-soft); }
  .setup h1 {
    font-size: 40px;
    font-weight: 800;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
  }
  .setup p { color: var(--muted); font-size: 17px; margin-bottom: 32px; }

  .target-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 36px;
  }
  @media (max-width: 540px) {
    .target-grid { grid-template-columns: repeat(2, 1fr); }
  }
  .target-card {
    padding: 24px 16px;
    background: var(--white);
    border: 2px solid var(--gray-border);
    border-radius: var(--radius);
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .target-card:hover { border-color: var(--teal); transform: translateY(-2px); }
  .target-card.selected {
    border-color: var(--teal);
    background: var(--teal-soft);
  }
  .setup.test .target-card.selected {
    border-color: var(--coral);
    background: var(--coral-soft);
  }
  .target-num { font-size: 32px; font-weight: 800; color: var(--dark); }
  .target-label { font-size: 12px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-top: 4px; }

  .start-btn {
    width: 100%;
    padding: 18px 28px;
    background: var(--teal);
    color: var(--white);
    border-radius: var(--radius);
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 0.02em;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .start-btn:hover { background: var(--teal-dark); transform: translateY(-1px); box-shadow: var(--shadow); }
  .setup.test .start-btn { background: var(--coral); }
  .setup.test .start-btn:hover { background: #E04E54; }
  .start-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* Quiz screen */
  .quiz {
    padding: 32px 24px 48px;
    max-width: 760px;
    margin: 0 auto;
  }
  .question-prompt {
    background: var(--white);
    border-radius: var(--radius-lg);
    padding: 32px 28px;
    box-shadow: var(--shadow);
    margin-bottom: 24px;
    border-left: 4px solid var(--teal);
  }
  .question-meta {
    font-size: 12px;
    letter-spacing: 0.12em;
    font-weight: 700;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .question-text {
    font-size: clamp(22px, 3.4vw, 28px);
    font-weight: 700;
    color: var(--dark);
    line-height: 1.35;
  }

  .options { display: flex; flex-direction: column; gap: 12px; }
  .option {
    display: flex;
    align-items: center;
    gap: 18px;
    background: var(--white);
    border: 2px solid var(--gray-border);
    border-radius: var(--radius);
    padding: 18px 22px;
    text-align: left;
    transition: all 0.18s cubic-bezier(0.22, 1, 0.36, 1);
    font-family: inherit;
    font-size: 17px;
    color: var(--dark);
    width: 100%;
  }
  .option:not(:disabled):hover {
    border-color: var(--teal);
    background: var(--teal-tint);
    transform: translateX(2px);
  }
  .option-badge {
    flex-shrink: 0;
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--teal-soft);
    color: var(--teal);
    font-weight: 700;
    font-size: 17px;
    display: grid; place-items: center;
    transition: all 0.18s;
  }
  .option-text { flex: 1; }
  .option-shortcut {
    font-size: 11px;
    color: var(--muted);
    background: var(--gray-bg);
    border-radius: 6px;
    padding: 4px 8px;
    font-weight: 600;
    opacity: 0.7;
  }
  @media (max-width: 540px) { .option-shortcut { display: none; } }

  /* Option states after answer (drill mode) */
  .option.correct {
    border-color: var(--green);
    background: var(--green-soft);
    color: var(--dark);
  }
  .option.correct .option-badge {
    background: var(--green);
    color: var(--white);
  }
  .option.wrong-pick {
    border-color: var(--red);
    background: var(--red-soft);
  }
  .option.wrong-pick .option-badge {
    background: var(--red);
    color: var(--white);
  }
  .option.dimmed { opacity: 0.45; }
  .option:disabled { cursor: default; }

  /* Selected (test mode, before next) */
  .option.selected {
    border-color: var(--teal);
    background: var(--teal-soft);
  }
  .option.selected .option-badge {
    background: var(--teal);
    color: var(--white);
  }

  /* Feedback panel (drill mode) */
  .feedback {
    margin-top: 24px;
    border-radius: var(--radius);
    padding: 22px 24px;
    animation: slideIn 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .feedback.correct {
    background: var(--green-soft);
    border-left: 4px solid var(--green);
  }
  .feedback.wrong {
    background: var(--coral-soft);
    border-left: 4px solid var(--coral);
  }
  .feedback-title {
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .feedback.correct .feedback-title { color: var(--green); }
  .feedback.wrong .feedback-title { color: var(--coral); }
  .feedback-body { color: var(--dark); font-size: 15px; line-height: 1.55; }
  .feedback-correct-answer { font-weight: 600; margin-top: 8px; }
  .feedback-correct-answer em { color: var(--green); font-style: normal; font-weight: 700; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Next button */
  .next-row {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 16px;
    margin-top: 24px;
  }
  .next-row .hint {
    font-size: 13px;
    color: var(--muted);
  }
  .next-btn {
    padding: 14px 28px;
    background: var(--teal);
    color: var(--white);
    border-radius: var(--radius);
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.02em;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .next-btn:hover { background: var(--teal-dark); transform: translateY(-1px); box-shadow: var(--shadow); }
  .next-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  /* Keyboard hints */
  .kbd-hints {
    text-align: center;
    margin-top: 32px;
    font-size: 12px;
    color: var(--muted);
  }
  .kbd-hints kbd {
    background: var(--white);
    border: 1px solid var(--gray-border);
    border-bottom-width: 2px;
    border-radius: 5px;
    padding: 2px 7px;
    font-family: inherit;
    font-size: 11px;
    font-weight: 700;
    color: var(--dark);
    margin: 0 2px;
  }
  @media (max-width: 540px) { .kbd-hints { display: none; } }

  /* Done / Results screens */
  .results { max-width: 720px; margin: 0 auto; padding: 48px 24px; text-align: center; }
  .results-emoji { font-size: 64px; margin-bottom: 16px; }
  .results-title {
    font-size: clamp(32px, 5vw, 48px);
    font-weight: 800;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
  }
  .results-sub { color: var(--muted); font-size: 18px; margin-bottom: 36px; }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin: 0 auto 40px;
    max-width: 540px;
  }
  @media (max-width: 540px) {
    .stats-row { grid-template-columns: 1fr 1fr; }
    .stats-row .stat:last-child { grid-column: 1 / -1; }
  }
  .stat {
    background: var(--white);
    border: 1px solid var(--gray-border);
    border-radius: var(--radius);
    padding: 22px 16px;
    text-align: center;
  }
  .stat-value {
    font-size: 32px;
    font-weight: 800;
    color: var(--dark);
    line-height: 1;
    margin-bottom: 4px;
  }
  .stat-value.coral { color: var(--coral); }
  .stat-value.teal { color: var(--teal); }
  .stat-value.green { color: var(--green); }
  .stat-label {
    font-size: 12px;
    letter-spacing: 0.08em;
    color: var(--muted);
    text-transform: uppercase;
    font-weight: 600;
  }

  .results-actions {
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .btn-primary {
    padding: 14px 26px;
    background: var(--teal);
    color: var(--white);
    border-radius: var(--radius);
    font-weight: 700;
    font-size: 15px;
    transition: all 0.2s;
  }
  .btn-primary:hover { background: var(--teal-dark); transform: translateY(-1px); }
  .btn-secondary {
    padding: 14px 26px;
    background: var(--white);
    color: var(--dark);
    border: 1px solid var(--gray-border);
    border-radius: var(--radius);
    font-weight: 600;
    font-size: 15px;
    transition: all 0.2s;
  }
  .btn-secondary:hover { border-color: var(--teal); color: var(--teal); }

  /* Review (test results) */
  .review {
    text-align: left;
    margin-top: 16px;
  }
  .review-header {
    font-size: 14px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin: 40px 0 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--gray-border);
  }
  .review-item {
    background: var(--white);
    border: 1px solid var(--gray-border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 16px;
    border-left: 4px solid var(--coral);
  }
  .review-prompt {
    font-weight: 700;
    font-size: 17px;
    color: var(--dark);
    margin-bottom: 14px;
  }
  .review-line { font-size: 15px; margin-bottom: 6px; display: flex; gap: 10px; align-items: flex-start; }
  .review-line .lbl {
    flex-shrink: 0;
    font-weight: 700;
    width: 88px;
    color: var(--muted);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding-top: 2px;
  }
  .review-line.you .val { color: var(--red); }
  .review-line.correct .val { color: var(--green); font-weight: 600; }
  .review-explanation {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px dashed var(--gray-border);
    font-size: 14px;
    color: var(--dark);
    line-height: 1.55;
  }

  /* Screen transitions */
  .screen { animation: fadeIn 0.32s cubic-bezier(0.22, 1, 0.36, 1); }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Hide */
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div id="app" class="app">
  <!-- Screens render here -->
</div>

<script>

d etish: 'men hozir foydalanyapman' degan ma'noda 'yo'q, bera olmayman'.", "_id": 7}, {"prompt": "Did you enjoy the concert last night?", "options": ["It starts at eight o'clock.", "Yes, the music was amazing!", "I'm going to go tomorrow."], "correctIndex": 1, "explanation": "'Did you enjoy' — o'tgan zamondagi savol. Javob ham o'tgan zamonda va his-tuyg'uni bildirishi kerak.", "_id": 8}, {"prompt": "How often do you go to the gym?", "options": ["I went there yesterday morning.", "Three times a week.", "It's near the supermarket."], "correctIndex": 1, "explanation": "'How often' — takroriylik haqida savol. Javob qanchalik tez-tez ekanligini ko'rsatishi kerak.", "_id": 9}, {"prompt": "Whose bag is this?", "options": ["It belongs to my sister.", "She is carrying a blue bag.", "I think it's a nice bag."], "correctIndex": 0, "explanation": "'Whose' — kimning? Javob egasini ko'rsatishi kerak.", "_id": 10}, {"prompt": "Could you pass me the salt, please?", "options": ["Yes, here you are.", "I like salt on my chips.", "The salt is in the kitchen."], "correctIndex": 0, "explanation": "'Could you…' — xushmuomala iltimos. 'Yes, here you are' — iltimosni bajarish.", "_id": 11}, {"prompt": "Would you like some more cake?", "options": ["Yes, please. It's delicious.", "I ate some cake earlier.", "I don't like chocolate."], "correctIndex": 0, "explanation": "'Would you like' — taklif. 'Yes, please' — qabul qilishning standart yo'li.", "_id": 12}, {"prompt": "What time does the film start?", "options": ["It's two hours long.", "At half past seven.", "It started a week ago."], "correctIndex": 1, "explanation": "'What time' — aniq vaqt haqida savol. Faqat aniq vaqt javobi to'g'ri.", "_id": 13}, {"prompt": "I'm sorry, I've broken your glass.", "options": ["It was a glass of water.", "Don't worry about it.", "I'm breaking it now."], "correctIndex": 1, "explanation": "Birov uzr so'raganda, 'Don't worry about it' — kechirim va tinchlantirish.", "_id": 14}, {"prompt": "How was your holiday // ============================================================
// State
// ============================================================
const state = {
  screen: 'landing',
  mode: null,        // 'drill' | 'test'
  target: null,      // 10 | 20 | 50 | 100
  // drill state
  drillQueue: [],    // questions yet to master (FIFO with re-push on wrong)
  drillTotal: 0,
  drillMastered: 0,
  drillAttempts: 0,
  drillStartTime: null,
  // test state
  testQueue: [],
  testIndex: 0,
  testAnswers: [],   // { q, selected, correctIndex }
  // current question UI state
  current: null,
  selectedIndex: null,
  isAnswered: false,
  wasCorrect: null,
};

// ============================================================
// Helpers
// ============================================================
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Take a question and produce a "presented" copy with options shuffled
// and correctIndex updated to point at the shuffled position.
function presentQuestion(q) {
  const idxs = shuffle([0, 1, 2]);
  const shuffledOptions = idxs.map(i => q.options[i]);
  const newCorrect = idxs.indexOf(q.correctIndex);
  return {
    sourceId: q._id,
    prompt: q.prompt,
    options: shuffledOptions,
    correctIndex: newCorrect,
    correctText: q.options[q.correctIndex],
    explanation: q.explanation,
  };
}

function sample(arr, n) { return shuffle(arr).slice(0, n); }

function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return `${m}:${s.toString().padStart(2, '0')}`;
}

// ============================================================
// Renderers
// ============================================================
const app = document.getElementById('app');

function render() {
  switch (state.screen) {
    case 'landing':       renderLanding(); break;
    case 'drill-setup':   renderSetup('drill'); break;
    case 'test-setup':    renderSetup('test'); break;
    case 'drill':         renderQuiz('drill'); break;
    case 'test':          renderQuiz('test'); break;
    case 'drill-done':    renderDrillDone(); break;
    case 'test-results':  renderTestResults(); break;
  }
}

function renderLanding() {
  app.innerHTML = `
    <div class="screen container">
      <div class="hero">
        <span class="hero-eyebrow">LISTENING PART 1 · PRACTICE BANK</span>
        <h1 class="hero-title">Train your <span class="accent">listening agility</span></h1>
        <p class="hero-sub">100 practice questions. Two modes. Repeat until the right answer is automatic.</p>
      </div>
      <div class="mode-grid">
        <button class="mode-card drill" onclick="goto('drill-setup')">
          <div class="mode-icon">⚡</div>
          <div class="mode-title">Drill Mode</div>
          <div class="mode-desc">Quick, random questions. See the answer right away. Wrong ones come back until you nail them.</div>
          <span class="mode-cta">Build agility →</span>
        </button>
        <button class="mode-card test" onclick="goto('test-setup')">
          <div class="mode-icon">📋</div>
          <div class="mode-title">Test Mode</div>
          <div class="mode-desc">Pick your length. Answer everything without hints. See your score and review what you missed.</div>
          <span class="mode-cta">Test yourself →</span>
        </button>
      </div>
      <div class="signature">Prepared by <strong>Mr. Khurshid</strong></div>
    </div>
  `;
}

function renderSetup(mode) {
  const isDrill = mode === 'drill';
  app.innerHTML = `
    <div class="screen setup ${isDrill ? 'drill' : 'test'}">
      <button class="setup-back" onclick="goto('landing')">← Back to menu</button>
      <span class="setup-badge">${isDrill ? '⚡ DRILL MODE' : '📋 TEST MODE'}</span>
      <h1>${isDrill ? 'How many questions to master?' : 'How many questions in the test?'}</h1>
      <p>${isDrill
        ? "You'll keep going until you've answered each one correctly. Wrong answers come back."
        : "All questions in one go. No feedback during the test — you'll see the answers at the end."}</p>
      <div class="target-grid" id="target-grid">
        ${[10, 20, 50, 100].map(n => `
          <button class="target-card" data-n="${n}" onclick="pickTarget(${n})">
            <div class="target-num">${n}</div>
            <div class="target-label">${n === 100 ? 'All' : 'Questions'}</div>
          </button>
        `).join('')}
      </div>
      <button class="start-btn" id="start-btn" onclick="startSession()" disabled>
        Start <span>→</span>
      </button>
    </div>
  `;
}

function pickTarget(n) {
  state.target = n;
  document.querySelectorAll('.target-card').forEach(el => {
    el.classList.toggle('selected', parseInt(el.dataset.n) === n);
  });
  document.getElementById('start-btn').disabled = false;
}

function startSession() {
  if (!state.target) return;
  if (state.screen === 'drill-setup') {
    state.mode = 'drill';
    const sampled = sample(QUESTIONS, state.target);
    state.drillQueue = sampled.map(q => presentQuestion(q));
    state.drillTotal = state.target;
    state.drillMastered = 0;
    state.drillAttempts = 0;
    state.drillStartTime = Date.now();
    state.current = state.drillQueue.shift();
    state.screen = 'drill';
  } else {
    state.mode = 'test';
    const sampled = sample(QUESTIONS, state.target);
    state.testQueue = sampled.map(q => presentQuestion(q));
    state.testIndex = 0;
    state.testAnswers = [];
    state.current = state.testQueue[0];
    state.screen = 'test';
  }
  resetQuestionUI();
  render();
}

function resetQuestionUI() {
  state.selectedIndex = null;
  state.isAnswered = false;
  state.wasCorrect = null;
}

function renderQuiz(mode) {
  const q = state.current;
  let progressFraction, progressLabel;
  if (mode === 'drill') {
    progressFraction = state.drillMastered / state.drillTotal;
    progressLabel = `${state.drillMastered} / ${state.drillTotal} mastered`;
  } else {
    progressFraction = state.testIndex / state.testQueue.length;
    progressLabel = `Question ${state.testIndex + 1} of ${state.testQueue.length}`;
  }

  const letters = ['A', 'B', 'C'];
  const optionsHtml = q.options.map((opt, i) => {
    let cls = 'option';
    if (mode === 'test' && state.selectedIndex === i && !state.isAnswered) cls += ' selected';
    if (mode === 'drill' && state.isAnswered) {
      if (i === q.correctIndex) cls += ' correct';
      else if (i === state.selectedIndex) cls += ' wrong-pick';
      else cls += ' dimmed';
    }
    return `
      <button class="${cls}" onclick="pickOption(${i})" ${state.isAnswered ? 'disabled' : ''}>
        <span class="option-badge">${letters[i]}</span>
        <span class="option-text">${escapeHtml(opt)}</span>
        <span class="option-shortcut">${i + 1}</span>
      </button>
    `;
  }).join('');

  let feedbackHtml = '';
  if (mode === 'drill' && state.isAnswered) {
    if (state.wasCorrect) {
      feedbackHtml = `
        <div class="feedback correct">
          <div class="feedback-title">✓ To'g'ri!</div>
          <div class="feedback-body">${escapeHtml(q.explanation)}</div>
        </div>
      `;
    } else {
      feedbackHtml = `
        <div class="feedback wrong">
          <div class="feedback-title">✗ Noto'g'ri</div>
          <div class="feedback-body">${escapeHtml(q.explanation)}</div>
        </div>
      `;
    }
  }

  const showNext = (mode === 'drill' && state.isAnswered) || (mode === 'test' && state.selectedIndex !== null);
  const nextLabel = mode === 'test' && state.testIndex === state.testQueue.length - 1 ? 'Finish' : 'Next';

  app.innerHTML = `
    <div class="topbar">
      <span class="topbar-brand">LISTENING · PART 1</span>
      <div class="topbar-progress">
        <div class="progress-track">
          <div class="progress-fill" style="width: ${Math.min(100, progressFraction * 100)}%"></div>
        </div>
        <span class="progress-label">${progressLabel}</span>
      </div>
      <button class="exit-btn" onclick="confirmExit()" title="Exit">✕</button>
    </div>
    <div class="screen quiz">
      <div class="question-prompt">
        <div class="question-meta">${mode === 'drill' ? 'DRILL' : 'TEST'} · ATTEMPT ${mode === 'drill' ? state.drillAttempts + 1 : state.testIndex + 1}</div>
        <div class="question-text">${escapeHtml(q.prompt)}</div>
      </div>
      <div class="options">${optionsHtml}</div>
      ${feedbackHtml}
      <div class="next-row">
        ${showNext ? `<span class="hint">Press <kbd>Enter</kbd></span><button class="next-btn" onclick="goNext()">${nextLabel} <span>→</span></button>` : ''}
      </div>
      <div class="kbd-hints">
        Shortcuts: <kbd>1</kbd> <kbd>2</kbd> <kbd>3</kbd> to pick · <kbd>Enter</kbd> to continue · <kbd>Esc</kbd> to exit
      </div>
    </div>
  `;
}

function pickOption(i) {
  if (state.isAnswered) return;

  if (state.mode === 'drill') {
    state.selectedIndex = i;
    state.isAnswered = true;
    state.wasCorrect = (i === state.current.correctIndex);
    state.drillAttempts++;
    if (state.wasCorrect) {
      state.drillMastered++;
    } else {
      // requeue the question to the back so it resurfaces
      state.drillQueue.push(state.current);
    }
    render();
  } else {
    // test mode: just remember the selection
    state.selectedIndex = i;
    render();
  }
}

function goNext() {
  if (state.mode === 'drill') {
    if (state.drillMastered >= state.drillTotal || state.drillQueue.length === 0) {
      state.screen = 'drill-done';
      render();
      return;
    }
    state.current = state.drillQueue.shift();
    resetQuestionUI();
    render();
  } else {
    // test mode
    if (state.selectedIndex === null) return;
    state.testAnswers.push({
      q: state.current,
      selected: state.selectedIndex,
    });
    if (state.testIndex === state.testQueue.length - 1) {
      state.screen = 'test-results';
      render();
      return;
    }
    state.testIndex++;
    state.current = state.testQueue[state.testIndex];
    resetQuestionUI();
    render();
  }
}

function renderDrillDone() {
  const elapsed = Math.floor((Date.now() - state.drillStartTime) / 1000);
  const accuracy = Math.round((state.drillTotal / state.drillAttempts) * 100);
  app.innerHTML = `
    <div class="screen results">
      <div class="results-emoji">🎉</div>
      <h1 class="results-title">Done!</h1>
      <p class="results-sub">You mastered all ${state.drillTotal} questions.</p>
      <div class="stats-row">
        <div class="stat">
          <div class="stat-value coral">${state.drillTotal}</div>
          <div class="stat-label">Mastered</div>
        </div>
        <div class="stat">
          <div class="stat-value teal">${state.drillAttempts}</div>
          <div class="stat-label">Attempts</div>
        </div>
        <div class="stat">
          <div class="stat-value">${formatTime(elapsed)}</div>
          <div class="stat-label">Time</div>
        </div>
      </div>
      <div class="results-actions">
        <button class="btn-primary" onclick="goto('drill-setup'); state.target = null;">Try another drill</button>
        <button class="btn-secondary" onclick="goto('landing')">Back to menu</button>
      </div>
    </div>
  `;
}

function renderTestResults() {
  const total = state.testAnswers.length;
  const correct = state.testAnswers.filter(a => a.selected === a.q.correctIndex).length;
  const pct = Math.round((correct / total) * 100);
  const wrongAnswers = state.testAnswers.filter(a => a.selected !== a.q.correctIndex);

  const letters = ['A', 'B', 'C'];

  const reviewHtml = wrongAnswers.length > 0 ? `
    <div class="review-header">Review · ${wrongAnswers.length} to revisit</div>
    ${wrongAnswers.map((a, idx) => `
      <div class="review-item">
        <div class="review-prompt">${escapeHtml(a.q.prompt)}</div>
        <div class="review-line you">
          <span class="lbl">You picked</span>
          <span class="val">${letters[a.selected]}. ${escapeHtml(a.q.options[a.selected])}</span>
        </div>
        <div class="review-line correct">
          <span class="lbl">Correct</span>
          <span class="val">${letters[a.q.correctIndex]}. ${escapeHtml(a.q.options[a.q.correctIndex])}</span>
        </div>
        <div class="review-explanation">${escapeHtml(a.q.explanation)}</div>
      </div>
    `).join('')}
  ` : `
    <div class="review-header" style="text-align:center; border:none; color:var(--green)">🎯 Perfect score — nothing to review!</div>
  `;

  app.innerHTML = `
    <div class="screen results">
      <div class="results-emoji">${pct === 100 ? '🏆' : pct >= 70 ? '👏' : '💪'}</div>
      <h1 class="results-title">${correct} / ${total}</h1>
      <p class="results-sub">${pct}% correct</p>
      <div class="stats-row">
        <div class="stat">
          <div class="stat-value green">${correct}</div>
          <div class="stat-label">Correct</div>
        </div>
        <div class="stat">
          <div class="stat-value coral">${wrongAnswers.length}</div>
          <div class="stat-label">Wrong</div>
        </div>
        <div class="stat">
          <div class="stat-value teal">${pct}%</div>
          <div class="stat-label">Score</div>
        </div>
      </div>
      <div class="results-actions">
        <button class="btn-primary" onclick="goto('test-setup'); state.target = null;">Try another test</button>
        <button class="btn-secondary" onclick="goto('landing')">Back to menu</button>
      </div>
      <div class="review">${reviewHtml}</div>
    </div>
  `;
}

function confirmExit() {
  if (confirm('Exit the session? Your progress will be lost.')) {
    goto('landing');
  }
}

function goto(screen) {
  state.screen = screen;
  state.target = null;
  render();
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

// ============================================================
// Keyboard shortcuts
// ============================================================
document.addEventListener('keydown', (e) => {
  if (state.screen !== 'drill' && state.screen !== 'test') return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

  if (e.key === '1' || e.key.toLowerCase() === 'a') {
    e.preventDefault();
    pickOption(0);
  } else if (e.key === '2' || e.key.toLowerCase() === 'b') {
    e.preventDefault();
    pickOption(1);
  } else if (e.key === '3' || e.key.toLowerCase() === 'c') {
    e.preventDefault();
    pickOption(2);
  } else if (e.key === 'Enter') {
    e.preventDefault();
    const showNext = (state.mode === 'drill' && state.isAnswered) ||
                     (state.mode === 'test' && state.selectedIndex !== null);
    if (showNext) goNext();
  } else if (e.key === 'Escape') {
    e.preventDefault();
    confirmExit();
  }
});

// Scroll handler for blob fade-out (cosmetic)
window.addEventListener('scroll', () => {
  document.body.classList.toggle('scrolled', window.scrollY > 100);
});

// Init
render();
</script>
</body>
</html>
